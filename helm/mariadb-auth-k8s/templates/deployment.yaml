apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount }}
      containers:
      - name: mariadb
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: ""
        - name: MYSQL_ALLOW_EMPTY_PASSWORD
          value: "yes"
        - name: MYSQL_DATABASE
          value: "testdb"
        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
        - name: tokenreviewer-token
          mountPath: /var/run/secrets/tokenreviewer
          readOnly: true
        - name: auth-k8s-config
          mountPath: /etc/mysql/mariadb.conf.d/60-auth-k8s.cnf
          subPath: auth_k8s.cnf
          readOnly: true
        {{- if .Values.tls.enabled }}
        - name: tls-certs
          mountPath: /etc/mysql/tls
          readOnly: true
        {{- end }}
        livenessProbe:
          exec:
            command:
            - bash
            - -c
            - "$(command -v mysqladmin || command -v mariadb-admin) ping -h localhost --skip-ssl"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
            - bash
            - -c
            - "$(command -v mysqladmin || command -v mariadb-admin) ping -h localhost --skip-ssl"
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
      volumes:
      - name: mysql-data
        emptyDir: {}
      - name: tokenreviewer-token
        secret:
          secretName: {{ .Values.tokenreviewer.secretName }}
      - name: auth-k8s-config
        configMap:
          name: {{ .Release.Name }}-config
      {{- if .Values.tls.enabled }}
      - name: tls-certs
        secret:
          secretName: {{ .Values.tls.secretName }}
          defaultMode: 0444
      {{- end }}
