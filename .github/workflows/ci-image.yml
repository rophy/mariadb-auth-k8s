name: CI Image

on:
  workflow_dispatch:

jobs:
  build-ci-image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          file: Dockerfile.ci
          push: true
          tags: ghcr.io/rophy/mariadb-auth-k8s:ci
