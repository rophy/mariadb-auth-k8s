name: CI

on: [push, pull_request]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mariadb-version: ["10.6.27", "10.11.18", "11.4.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: include/mariadb-${{ matrix.mariadb-version }}-headers.tar.gz
          key: mariadb-headers-${{ matrix.mariadb-version }}
      - run: make init MARIADB_VERSION=${{ matrix.mariadb-version }}
      - run: make unit-test MARIADB_VERSION=${{ matrix.mariadb-version }}

  e2e-test:
    needs: unit-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Latin square: each MariaDB and K8s version appears exactly once
        include:
          - mariadb-version: "10.6.27"
            k8s-version: "1.24"
            kind-node-image: "kindest/node:v1.24.17"
            kind-binary: "kind-v0.22.0"
          - mariadb-version: "10.11.18"
            k8s-version: "1.31"
            kind-node-image: "kindest/node:v1.31.14"
            kind-binary: "kind-v0.31.0"
          - mariadb-version: "11.4.12"
            k8s-version: "1.35"
            kind-node-image: "kindest/node:v1.35.0"
            kind-binary: "kind-v0.31.0"
    steps:
      - uses: actions/checkout@v4

      - name: Install tools from CI image
        run: |
          docker pull ghcr.io/rophy/mariadb-auth-k8s:ci
          cid=$(docker create ghcr.io/rophy/mariadb-auth-k8s:ci)
          sudo docker cp "$cid":/usr/local/bin/${{ matrix.kind-binary }} /usr/local/bin/kind
          sudo docker cp "$cid":/usr/local/bin/kubectl /usr/local/bin/
          sudo docker cp "$cid":/usr/local/bin/skaffold /usr/local/bin/
          docker rm "$cid"
          sudo apt-get update && sudo apt-get install -y bats

      - uses: actions/cache@v4
        with:
          path: include/mariadb-${{ matrix.mariadb-version }}-headers.tar.gz
          key: mariadb-headers-${{ matrix.mariadb-version }}

      - name: Download headers
        run: make init MARIADB_VERSION=${{ matrix.mariadb-version }}

      - name: Create Kind cluster (K8s ${{ matrix.k8s-version }})
        run: ./scripts/setup-kind-clusters.sh "${{ matrix.kind-node-image }}"

      - name: Build and deploy
        run: make deploy MARIADB_VERSION=${{ matrix.mariadb-version }}

      - name: Run e2e tests
        run: make e2e-test

      - name: Show MariaDB logs on failure
        if: failure()
        run: kubectl logs -n mariadb-auth-test -l app=mariadb --context kind-cluster-a --tail=50
