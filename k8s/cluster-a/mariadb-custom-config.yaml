---
# MariaDB with explicit custom api_url (valid alternative DNS name)
# Tests that auth_k8s_api_url is actually used when configured
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-k8s-config-custom-url
  namespace: mariadb-auth-test
data:
  auth_k8s.cnf: |
    [mysqld]
    plugin_load_add = auth_k8s
    auth_k8s_api_url = https://kubernetes.default.svc.cluster.local
    auth_k8s_token_path = /var/run/secrets/tokenreviewer/token
    auth_k8s_ca_path = /var/run/secrets/tokenreviewer/ca.crt
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb-custom-url
  namespace: mariadb-auth-test
  labels:
    app: mariadb-custom-url
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb-custom-url
  template:
    metadata:
      labels:
        app: mariadb-custom-url
    spec:
      serviceAccountName: mariadb
      containers:
      - name: mariadb
        image: mariadb-server:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: ""
        - name: MYSQL_ALLOW_EMPTY_PASSWORD
          value: "yes"
        - name: MYSQL_DATABASE
          value: "testdb"
        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
        - name: tokenreviewer-token
          mountPath: /var/run/secrets/tokenreviewer
          readOnly: true
        - name: auth-k8s-config
          mountPath: /etc/mysql/mariadb.conf.d/60-auth-k8s.cnf
          subPath: auth_k8s.cnf
          readOnly: true
        readinessProbe:
          exec:
            command:
            - bash
            - -c
            - "$(command -v mysqladmin || command -v mariadb-admin) ping -h localhost"
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
      volumes:
      - name: mysql-data
        emptyDir: {}
      - name: tokenreviewer-token
        secret:
          secretName: tokenreviewer-token
      - name: auth-k8s-config
        configMap:
          name: auth-k8s-config-custom-url
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb-custom-url
  namespace: mariadb-auth-test
spec:
  type: ClusterIP
  selector:
    app: mariadb-custom-url
  ports:
  - port: 3306
    targetPort: 3306
---
# MariaDB with unreachable api_url — auth should fail gracefully
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-k8s-config-bad-url
  namespace: mariadb-auth-test
data:
  auth_k8s.cnf: |
    [mysqld]
    plugin_load_add = auth_k8s
    auth_k8s_api_url = https://invalid-api-server.nonexistent:6443
    auth_k8s_token_path = /var/run/secrets/tokenreviewer/token
    auth_k8s_ca_path = /var/run/secrets/tokenreviewer/ca.crt
    auth_k8s_timeout = 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb-bad-url
