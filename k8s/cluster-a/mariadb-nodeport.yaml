---
# MariaDB deployment with HostPort for cross-cluster access
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: mariadb-auth-test
  labels:
    app: mariadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      serviceAccountName: mariadb
      containers:
      - name: mariadb
        image: mariadb-server:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3306
          name: mysql
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: ""
        - name: MYSQL_ALLOW_EMPTY_PASSWORD
          value: "yes"
        - name: MYSQL_DATABASE
          value: "testdb"
        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
        - name: tokenreviewer-token
          mountPath: /var/run/secrets/tokenreviewer
          readOnly: true
        - name: auth-k8s-config
          mountPath: /etc/mysql/mariadb.conf.d/60-auth-k8s.cnf
          subPath: auth_k8s.cnf
          readOnly: true
        livenessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - localhost
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - localhost
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
      volumes:
      - name: mysql-data
        emptyDir: {}
      - name: tokenreviewer-token
        secret:
          secretName: tokenreviewer-token
      - name: auth-k8s-config
        configMap:
          name: auth-k8s-config
---
# Plugin configuration: point auth_k8s to the tokenreviewer SA credentials
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-k8s-config
  namespace: mariadb-auth-test
data:
  auth_k8s.cnf: |
    [mysqld]
    plugin_load_add = auth_k8s
    auth_k8s_token_path = /var/run/secrets/tokenreviewer/token
    auth_k8s_ca_path = /var/run/secrets/tokenreviewer/ca.crt
---
# Internal ClusterIP service for in-cluster access
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: mariadb-auth-test
  labels:
    app: mariadb
spec:
  type: ClusterIP
  selector:
    app: mariadb
  ports:
  - port: 3306
    targetPort: 3306
    name: mysql
---
# NodePort service for cross-cluster access via Docker network
apiVersion: v1
kind: Service
metadata:
  name: mariadb-nodeport
  namespace: mariadb-auth-test
  labels:
    app: mariadb
    service: nodeport
spec:
  type: NodePort
  selector:
    app: mariadb
  ports:
  - port: 3306
    targetPort: 3306
    nodePort: 30306
    name: mysql
