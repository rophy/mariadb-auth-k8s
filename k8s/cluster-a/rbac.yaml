---
# MariaDB pod identity (no special RBAC permissions)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mariadb
  namespace: mariadb-auth-test
---
# Separate ServiceAccount for TokenReview API calls.
# Mounted into the MariaDB pod at a custom path so the plugin
# can call the TokenReview API without granting RBAC to the
# pod's own identity.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tokenreviewer
  namespace: mariadb-auth-test
---
# Long-lived token for the tokenreviewer ServiceAccount.
# Mounted into the MariaDB pod via a Secret volume.
apiVersion: v1
kind: Secret
metadata:
  name: tokenreviewer-token
  namespace: mariadb-auth-test
  annotations:
    kubernetes.io/service-account.name: tokenreviewer
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tokenreview-creator
rules:
- apiGroups: ["authentication.k8s.io"]
  resources: ["tokenreviews"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mariadb-tokenreview
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tokenreview-creator
subjects:
- kind: ServiceAccount
  name: tokenreviewer
  namespace: mariadb-auth-test
